<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Playlist — Chaitali</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <style>
    :root { --highlight-color: #A78BFA; }
    .music-page {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── Hero ── */
    .music-hero {
      text-align: center;
      padding: 20px 0 48px;
      position: relative;
    }

    .vinyl-icon {
      display: inline-block;
      font-size: 52px;
      margin-bottom: 16px;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .music-hero h1 {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #F472B6 0%, #A78BFA 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .music-hero-sub {
      font-size: 13px;
      opacity: 0.45;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .music-hero::after {
      content: "";
      display: block;
      width: 60px;
      height: 3px;
      background: linear-gradient(135deg, #F472B6, #A78BFA);
      margin: 24px auto 0;
      border-radius: 2px;
    }

    /* ── Playlist section ── */
    .playlist-block {
      margin-bottom: 44px;
    }

    .playlist-block-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(167, 139, 250, 0.1);
    }

    .playlist-block-header h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      margin: 0;
    }

    .playlist-block-header .mood-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Track row ── */
    .track-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 4px;
      transition: all 0.2s ease;
      cursor: default;
      position: relative;
    }

    .track-row:hover {
      background: rgba(167, 139, 250, 0.05);
      transform: translateX(4px);
    }

    [data-theme="dark"] .track-row:hover {
      background: rgba(196, 181, 253, 0.08);
    }

    .track-num {
      font-size: 12px;
      opacity: 0.3;
      text-align: right;
      font-weight: 500;
    }

    .track-row:hover .track-num {
      opacity: 0;
    }

    .play-icon {
      position: absolute;
      left: 16px;
      font-size: 12px;
      color: var(--highlight-color);
      opacity: 0;
      transition: opacity 0.15s;
      width: 28px;
      text-align: right;
    }

    .track-row:hover .play-icon { opacity: 1; }

    .track-main { min-width: 0; }

    .track-title {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 12px;
      opacity: 0.45;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .track-lang {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid rgba(167, 139, 250, 0.18);
      color: var(--highlight-color);
      font-weight: 500;
      background: rgba(167, 139, 250, 0.05);
    }

    .track-duration {
      font-size: 12px;
      opacity: 0.3;
      min-width: 36px;
      text-align: right;
    }

    /* ── Playlist card ── */
    .playlist-card {
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(167, 139, 250, 0.15), 0 4px 16px rgba(0,0,0,0.06);
      border: 1px solid rgba(167, 139, 250, 0.1);
      margin-bottom: 24px;
    }

    .playlist-card-inner {
      background: linear-gradient(135deg, #F5F0FF 0%, #EDE9FE 50%, #F5F0FF 100%);
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
    }

    /* animated blobs */
    .playlist-card-inner::before,
    .playlist-card-inner::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
      pointer-events: none;
    }
    .playlist-card-inner::before {
      width: 260px; height: 260px;
      background: #A78BFA;
      top: -60px; left: -60px;
    }
    .playlist-card-inner::after {
      width: 220px; height: 220px;
      background: #F472B6;
      bottom: -60px; right: -40px;
    }

    .pc-eq {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 36px;
      position: relative;
      z-index: 1;
    }

    .pc-bar {
      width: 4px;
      border-radius: 2px;
      background: linear-gradient(180deg, #F472B6, #A78BFA);
      animation: eq-bounce 1.1s ease-in-out infinite alternate;
    }

    @keyframes eq-bounce {
      from { height: 6px; }
      to   { height: 32px; }
    }

    .pc-bar:nth-child(1) { animation-delay: 0s;    }
    .pc-bar:nth-child(2) { animation-delay: 0.15s; }
    .pc-bar:nth-child(3) { animation-delay: 0.3s;  }
    .pc-bar:nth-child(4) { animation-delay: 0.45s; }
    .pc-bar:nth-child(5) { animation-delay: 0.6s;  }
    .pc-bar:nth-child(6) { animation-delay: 0.45s; }
    .pc-bar:nth-child(7) { animation-delay: 0.3s;  }

    .pc-label {
      color: rgba(91, 33, 182, 0.6);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .pc-title {
      color: #3B1F6E;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }

    .pc-sub {
      color: rgba(91, 33, 182, 0.6);
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    .pc-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #A78BFA;
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      padding: 14px 30px;
      border-radius: 50px;
      transition: all 0.25s ease;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      margin-top: 8px;
    }

    .pc-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 36px rgba(0,0,0,0.35);
    }

    .pc-btn svg {
      width: 20px; height: 20px;
      flex-shrink: 0;
    }

    /* ── Cassette decoration ── */
    .cassette-deco {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .cassette-line {
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(135deg, #F472B6, #A78BFA);
      opacity: 0.15;
      animation: eq 1.2s ease-in-out infinite alternate;
    }

    @keyframes eq {
      from { height: 3px; }
      to   { height: 14px; }
    }

    .cassette-line:nth-child(1) { width: 3px; animation-delay: 0s; }
    .cassette-line:nth-child(2) { width: 3px; animation-delay: 0.15s; }
    .cassette-line:nth-child(3) { width: 3px; animation-delay: 0.3s; }
    .cassette-line:nth-child(4) { width: 3px; animation-delay: 0.45s; }
    .cassette-line:nth-child(5) { width: 3px; animation-delay: 0.6s; }
    .cassette-line:nth-child(6) { width: 3px; animation-delay: 0.45s; }
    .cassette-line:nth-child(7) { width: 3px; animation-delay: 0.3s; }
    .cassette-line:nth-child(8) { width: 3px; animation-delay: 0.15s; }
  </style>
