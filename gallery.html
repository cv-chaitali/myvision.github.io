<head>

  <style>
    :root { --highlight-color: #A78BFA; }
    body {
      background-color: var(--bg-color);
      background-image: radial-gradient(var(--text-color) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg-color);
      opacity: 0.97;
      z-index: -1;
    }

    /* ── Hero header ── */
    .gallery-hero {
      max-width: 1000px;
      margin: 0 auto 10px;
      padding: 0 20px;
      text-align: center;
    }

    .film-strip {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 24px;
    }

    .film-hole {
      width: 18px;
      height: 12px;
      border-radius: 3px;
      background: var(--text-color);
      opacity: 0.15;
    }

    .gallery-hero h2 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #A78BFA 0%, #F472B6 50%, #f59e0b 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .gallery-hero-sub {
      font-size: 14px;
      opacity: 0.45;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .gallery-meta {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .meta-pill {
      font-size: 12px;
      opacity: 0.55;
      background: rgba(167, 139, 250, 0.06);
      border: 1px solid rgba(167, 139, 250, 0.12);
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    .shuffle-btn {
      background: linear-gradient(135deg, #A78BFA, #F472B6);
      color: white;
      border: none;
      padding: 10px 26px;
      border-radius: 30px;
      font-family: var(--font);
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 18px rgba(167, 139, 250, 0.3);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.02em;
    }

    .shuffle-btn:hover {
      transform: translateY(-3px) rotate(-1deg);
      box-shadow: 0 10px 28px rgba(167, 139, 250, 0.45);
    }

    .shuffle-btn svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    /* ── Masonry Grid ── */
    .gallery-grid-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .gallery-grid {
      column-count: 3;
      column-gap: 24px;
      padding: 10px 0;
    }

    @media (max-width: 768px) {
      .gallery-grid { column-count: 2; column-gap: 16px; }
      .gallery-hero h2 { font-size: 36px; }
    }

    @media (max-width: 480px) {
      .gallery-grid { column-count: 1; }
    }

    /* ── Polaroid card ── */
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 24px;
      background: white;
      padding: 10px 10px 36px 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      cursor: zoom-in;
      position: relative;
    }

    /* tape strip decoration */
    .gallery-item::before {
      content: "";
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 16px;
      background: rgba(245, 158, 11, 0.35);
      border-radius: 2px;
      z-index: 1;
    }

    [data-theme="dark"] .gallery-item {
      background: #2a2a2a;
    }

    [data-theme="dark"] .gallery-item::before {
      background: rgba(245, 158, 11, 0.2);
    }

    .gallery-item:hover {
      transform: scale(1.06) rotate(1.5deg) !important;
      box-shadow: 0 24px 48px rgba(0,0,0,0.18);
      z-index: 10;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      filter: sepia(8%) contrast(1.02);
      transition: filter 0.3s ease;
    }

    .gallery-item:hover img {
      filter: sepia(0%) contrast(1.05);
    }

    .photo-caption {
      text-align: center;
      font-size: 11px;
      opacity: 0.35;
      margin-top: 8px;
      letter-spacing: 0.04em;
      font-style: italic;
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.96);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(12px);
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox img {
      max-width: 88%;
      max-height: 88%;
      border: 8px solid white;
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
      transform: scale(0.92);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] .lightbox img { border-color: #2a2a2a; }

    .lightbox.active img { transform: scale(1); }

    .lightbox-close {
      position: absolute;
      top: 28px; right: 28px;
      color: white;
      font-size: 36px;
      cursor: pointer;
      width: 46px; height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: all 0.25s ease;
    }

    .lightbox-close:hover {
      background: rgba(255,255,255,0.2);
      transform: rotate(90deg);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.82) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>

  <script>
    document.getElementById('themeToggle').addEventListener('click', function () {
      document.body.dataset.theme = document.body.dataset.theme === 'light' ? 'dark' : 'light';
      this.textContent = document.body.dataset.theme === 'light' ? '☀️' : '🌙';
    });

    function randomizePolaroids() {
      document.querySelectorAll('.gallery-item').forEach((item, i) => {
        const r = Math.random() * 6 - 3;
        item.style.transform = `rotate(${r}deg)`;
        item.style.animation = 'none';
        item.offsetHeight;
        item.style.animation = `popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) ${i * 0.04}s forwards`;
      });
    }

    document.getElementById('shuffleBtn').addEventListener('click', () => {
      const grid = document.getElementById('galleryGrid');
      const items = Array.from(grid.children);
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      grid.innerHTML = '';
      items.forEach(item => grid.appendChild(item));
      randomizePolaroids();
    });

    randomizePolaroids();

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    document.getElementById('galleryGrid').addEventListener('click', e => {
      const item = e.target.closest('.gallery-item');
      if (item) {
        lightboxImg.src = item.querySelector('img').src;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
    });

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    document.addEventListener('contextmenu', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
    document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
  </script>
